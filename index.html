<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Parser GNSS FIUBA </title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .controls { margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
        #out { 
            background: #f4f4f4; 
            padding: 15px; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
            min-height: 100px;
            white-space: pre-wrap; 
            word-wrap: break-word;
        }
        button { cursor: pointer; padding: 5px 15px; }
        #btn-limpiar { background-color: #ffdddd; border: 1px solid #ffaaaa; }
        #btn-limpiar:hover { background-color: #ffcccc; }
    </style>
</head>
<body>

    <h2>Parser RINEX / SP3</h2>

    <div class="controls">
        <input type="file" id="file">
        <button id="btn-limpiar">Limpiar Pantalla</button>
    </div>

    <pre id="out">Esperando archivo...</pre>

    <script src="./js/fflate.js"></script>
    <script type="module" src="./js/main.js"></script>

</body>
</html>
